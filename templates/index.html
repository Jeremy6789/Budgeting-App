{% extends 'layout.html' %}

{% block content %}
<!-- 頂部資訊區：簡約白背景與核心數值 -->
<div class="bg-white px-8 pt-12 pb-8 rounded-b-[3rem] shadow-[0_10px_40px_rgba(0,0,0,0.03)] border-b border-slate-100 relative overflow-hidden">
    <!-- 裝飾背景 (極淡的藍色光暈) -->
    <div class="absolute top-0 right-0 w-40 h-40 bg-indigo-50/50 rounded-full -mr-20 -mt-20 blur-3xl"></div>

    <div class="flex justify-between items-start mb-10 relative z-10">
        <div>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-1">剩餘預算</p>
            <div id="balance" class="text-5xl font-black text-slate-800 tracking-tighter">$0</div>
        </div>
        <button onclick="setBudget()" class="w-12 h-12 bg-slate-50 text-slate-400 hover:text-indigo-600 hover:bg-white hover:shadow-md rounded-2xl flex items-center justify-center transition-all border border-slate-100">
            <i class="fa-solid fa-sliders text-lg"></i>
        </button>
    </div>

    <!-- 預算進度與分析區 -->
    <div class="space-y-8 relative z-10">
        
        <!-- 1. 總預算進度條 -->
        <div class="space-y-2">
            <div class="flex justify-between items-end">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">預算消耗進度</span>
                <span id="percentText" class="text-sm font-black text-indigo-500">0%</span>
            </div>
            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-indigo-500 transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- 2. 消費性質分配 (需要 vs 想要) -->
        <div class="bg-slate-50/60 p-6 rounded-[2.5rem] border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-2">
                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-tighter">消費性質分配</p>
                    <span id="healthScore" class="text-[9px] font-black bg-teal-50 text-teal-600 px-2 py-0.5 rounded border border-teal-100">健康度: 100%</span>
                </div>
            </div>
            
            <div class="flex h-2.5 w-full rounded-full overflow-hidden bg-slate-200">
                <!-- 必要支出 (綠色) -->
                <div id="needsBar" class="bg-teal-500 transition-all duration-700" style="width: 0%"></div>
                <!-- 想要支出 (藍色) -->
                <div id="wantsBar" class="bg-indigo-400 transition-all duration-700" style="width: 0%"></div>
            </div>

            <div class="flex justify-between mt-4">
                <div class="flex flex-col">
                    <span class="text-[9px] text-slate-400 font-black uppercase">必要 (需要)</span>
                    <b id="needsText" class="text-sm text-teal-600 font-extrabold mt-0.5">$0</b>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-slate-400 font-black uppercase">生活 (想要)</span>
                    <b id="wantsText" class="text-sm text-indigo-500 font-extrabold mt-0.5">$0</b>
                </div>
            </div>
        </div>

        <!-- 3. 預計月底結餘 (含 i 說明視窗) -->
        <div class="flex items-center justify-between px-6 py-5 bg-white border border-slate-100 rounded-3xl shadow-[0_4px_20px_rgba(0,0,0,0.02)]">
            <div class="flex flex-col">
                <div class="flex items-center space-x-1.5 group relative cursor-help">
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">預計月底結餘</p>
                    <i class="fa-solid fa-circle-info text-slate-300 text-[10px] group-hover:text-indigo-500 transition-colors"></i>
                    
                    <!-- 懸浮說明視窗 (Tooltip) -->
                    <div class="absolute bottom-full left-0 mb-3 w-60 p-4 bg-slate-800 text-white text-[11px] rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 leading-relaxed">
                        <p class="font-bold mb-2 text-indigo-300 flex items-center">
                            <i class="fa-solid fa-calculator mr-2"></i>計算方式說明
                        </p>
                        <ul class="space-y-1.5 text-slate-300">
                            <li class="flex items-start">
                                <span class="text-indigo-400 mr-1.5">●</span>
                                <span>計算您目前為止的日均花費速度。</span>
                            </li>
                            <li class="flex items-start">
                                <span class="text-indigo-400 mr-1.5">●</span>
                                <span>推估出本月結束時可能的總支出。</span>
                            </li>
                            <li class="flex items-start">
                                <span class="text-indigo-400 mr-1.5">●</span>
                                <span><b>公式：</b>預算 － (目前平均 × 全月天數)</span>
                            </li>
                        </ul>
                        <div class="mt-3 pt-2 border-t border-slate-700 text-[10px] text-slate-400 italic">
                            ※ 此為預測值，將隨您的日常花費變動。
                        </div>
                        <!-- 小箭頭裝飾 -->
                        <div class="absolute top-full left-4 border-8 border-transparent border-t-slate-800"></div>
                    </div>
                </div>
                <p id="estSaving" class="text-2xl font-black text-slate-800 mt-0.5">$0</p>
            </div>
            <div class="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                <i class="fa-solid fa-piggy-bank"></i>
            </div>
        </div>
    </div>
</div>

<!-- 分類支出圖表區 -->
<div class="p-8">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">分類支出分析</h2>
        <div class="flex items-center text-slate-300 text-[10px] font-bold">
            <span id="totalBudgetDisplay" class="mr-2">Budget: $10,000</span>
            <i class="fa-solid fa-chart-pie"></i>
        </div>
    </div>
    
    <div class="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm relative">
        <canvas id="mainChart" class="max-h-60 w-full"></canvas>
    </div>

    <!-- 底部空間緩衝 -->
    <div class="h-10"></div>
</div>
{% endblock %}

<div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end justify-center">
    <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-8 animate-slide-up shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modalTitle" class="text-xl font-black text-slate-800">新增帳目</h3>
            <button onclick="toggleModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
        </div>
        
        <form id="transactionForm" class="space-y-4">
            <input type="hidden" id="txId"> <!-- 隱藏 ID -->
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">名稱</label>
                    <input type="text" id="txTitle" required placeholder="例如：午餐、交通卡加值" 
                           class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">金額</label>
                    <input type="number" id="txAmount" required placeholder="0" 
                           class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">日期</label>
                    <input type="date" id="txDate" required 
                           class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">分類</label>
                    <!-- 修改 select 部分 -->
                    <select id="txCategory" class="w-full bg-slate-50 border-2 border-slate-50 p-3 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all text-sm font-medium">
                        <option value="飲食" data-icon="fa-utensils">🍴 飲食</option>
                        <option value="交通" data-icon="fa-car">🚗 交通</option>
                        <option value="娛樂" data-icon="fa-gamepad">🎮 娛樂</option>
                        <option value="購物" data-icon="fa-shopping-bag">🛍️ 購物</option>
                        <option value="固定" data-icon="fa-file-invoice-dollar">📄 固定支出</option>
                        <option value="其他" data-icon="fa-ellipsis-h">✨ 其他</option> <!-- 新增 -->
                    </select>
                </div>
            </div>

            <div class="flex items-center justify-between p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                <div class="flex items-center">
                    <i class="fa-solid fa-circle-check text-indigo-500 mr-3"></i>
                    <span class="text-sm font-medium text-indigo-900">這是必要支出</span>
                </div>
                <input type="checkbox" id="txIsNeed" checked class="w-6 h-6 rounded-full text-indigo-600 focus:ring-indigo-500 border-slate-300">
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-transform">
                儲存紀錄
            </button>
        </form>
    </div>
</div>

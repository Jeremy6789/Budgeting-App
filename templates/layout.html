<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budgeting Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .nav-link { color: #94a3b8; transition: all 0.3s; }
        .nav-link.active { color: #6366f1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 {% if request.path != '/login' %}pt-16 pb-28{% endif %}">

    <!-- 行動端容器外殼 -->
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-[0_0_50px_rgba(0,0,0,0.02)] relative">
        
        <!-- 頂部標題列 (僅在非登入頁顯示) -->
        {% if request.path != '/login' %}
        <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/80 backdrop-blur-xl border-b border-slate-50 flex justify-between items-center h-16 z-40 px-6">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs font-black">B</div>
                <h1 class="text-sm font-black text-slate-800 tracking-tighter uppercase">Budgeting <span class="text-indigo-600">Tool</span></h1>
            </div>
            <a href="/api/auth/logout" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-500 transition-colors">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </a>
        </header>
        {% endif %}

        <!-- 主要內容注入區 -->
        <main class="animate-fade-in">
            {% block content %}{% endblock %}
        </main>

        <!-- 底部導覽列 (僅在非登入頁顯示) -->
        {% if request.path != '/login' %}
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center h-20 z-40 px-4">
            
            <!-- 儀表板 (左) -->
            <a href="/" class="nav-link flex flex-col items-center justify-center flex-1 py-2 {% if request.path == '/' %}active{% endif %}">
                <i class="fa-solid fa-house-chimney text-xl"></i>
                <span class="text-[9px] mt-1.5 font-bold tracking-widest uppercase">儀表板</span>
            </a>

            <!-- 新增按鈕 (中) -->
            <div class="flex-1 flex justify-center -mt-10">
                <button onclick="toggleModal()" class="w-14 h-14 bg-indigo-600 text-white rounded-2xl shadow-xl shadow-indigo-200 flex items-center justify-center text-xl hover:bg-indigo-700 active:scale-95 transition-all border-4 border-white">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <!-- 明細 (右) -->
            <a href="/history" class="nav-link flex flex-col items-center justify-center flex-1 py-2 {% if request.path == '/history' %}active{% endif %}">
                <i class="fa-solid fa-receipt text-xl"></i>
                <span class="text-[9px] mt-1.5 font-bold tracking-widest uppercase">明細</span>
            </a>
            
        </nav>
        {% endif %}
    </div>

    <!-- 彈窗與主程式 JS -->
    {% if request.path != '/login' %}
        {% include 'components/add_modal.html' %}
        <script src="/static/js/main.js"></script>
    {% endif %}
    
    <script>
        // 自動啟動當前頁面標籤
        document.querySelectorAll('.nav-link').forEach(link => {
            if(link.getAttribute('href') === window.location.pathname) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
